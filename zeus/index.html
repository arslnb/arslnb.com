<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zeus</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #dbe1ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, #d1fae5 0, transparent 36%),
        radial-gradient(circle at 90% 0, #dbeafe 0, transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.65;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      text-decoration: none;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      transition: background 0.16s ease;
    }

    a:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Zeus</h1>
    <p>
      This is a fully standalone static section. It does not depend on the blog
      layout, includes, or shared styles.
    </p>
    <nav>
      <a href="./privacy/">Privacy Policy</a>
      <a href="./terms/">Terms of Service</a>
    </nav>
  </main>
</body>
</html>
